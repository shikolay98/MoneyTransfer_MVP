# Development:  docker compose up -d postgres   (API/web run locally via `npm run dev`)
# Full stack:   docker compose up -d --build    (production build, web on :8080)
#
# Before running the full stack fill .env with real secrets — the API refuses
# to boot in production with placeholder values.
services:
  postgres:
    image: postgres:16-alpine
    container_name: moneytransfer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: moneytransfer_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d moneytransfer_mvp']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: moneytransfer-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/moneytransfer_mvp?schema=public
      TRUST_PROXY: 'true'
      # Must equal the public browser origin: Socket.IO validates the handshake
      # Origin server-side even though nginx makes REST same-origin. Override
      # PUBLIC_ORIGIN (and rebuild web with matching VITE_API_URL) for a real domain.
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
      WEB_URL: ${PUBLIC_ORIGIN:-http://localhost:8080}
      API_URL: ${PUBLIC_ORIGIN:-http://localhost:8080}
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ''
        VITE_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-replace_with_bot_username}
    container_name: moneytransfer-web
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
